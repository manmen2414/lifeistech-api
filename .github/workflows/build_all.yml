name: Generate Library and Declare files

on: [push]

jobs:
  build-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: use node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"
      - run: npm install
      - run: npm run build:all
      - name: Commit & Push
        run: |
          set -x
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f types/
          git commit --author=. -m 'Generated: Library and d.ts files'
          git push
